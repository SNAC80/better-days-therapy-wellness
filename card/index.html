<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A6B72">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="robots" content="noindex, nofollow">
  <title>Dr. Stephanie Booker | Better Days Therapy &amp; Wellness — Digital Business Card</title>
  <meta name="description" content="Connect with Dr. Stephanie Booker, Founder of Better Days Therapy & Wellness. Save contact details, call, email, visit the website, or open the Google Business profile.">
  <link rel="canonical" href="https://betterdaystherapywellness.com/card/">
  <meta property="og:title" content="Dr. Stephanie Booker | Better Days Therapy & Wellness">
  <meta property="og:description" content="A warm, restorative digital business card for Better Days Therapy & Wellness.">
  <meta property="og:image" content="https://betterdaystherapywellness.com/card/assets/better-days-logo-white.png">
  <meta property="og:url" content="https://betterdaystherapywellness.com/card/">
  <meta property="og:type" content="profile">
  <link rel="icon" href="../favicons/favicon.ico">
  <link rel="apple-touch-icon" href="../favicons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="card-page" aria-label="Dr. Stephanie Booker Better Days Therapy and Wellness digital business card">
    <section class="brand-shell" aria-label="Better Days Therapy and Wellness digital business card">
      <button class="flip-area" type="button" id="flipCard" aria-label="Tap to flip Better Days digital card" aria-pressed="false">
        <span class="business-card" aria-hidden="true">
          <span class="card-face card-front">
            <span class="logo-medallion">
              <img src="assets/better-days-logo-card.png" alt="" class="medallion-logo">
            </span>
            <span class="card-name">Dr. Stephanie Booker</span>
            <span class="card-title">Founder</span>
            <span class="card-business">Better Days Therapy &amp; Wellness</span>
            <span class="card-note">Tap to view contact details</span>
          </span>

          <span class="card-face card-back">
            <span class="back-heading">Connect with Better Days</span>
            <span class="contact-line"><strong>Phone</strong> 346-254-7322</span>
            <span class="contact-line"><strong>Email</strong> betterdaystherapywellness@gmail.com</span>
            <span class="contact-line"><strong>Website</strong> betterdaystherapywellness.com</span>
            <span class="contact-line"><strong>Profile</strong> Google Business Page</span>
            <span class="card-note muted">Tap to flip back</span>
          </span>
        </span>
      </button>

      <nav class="action-grid" aria-label="Contact actions">
        <a class="action-button primary" href="tel:+13462547322">Call</a>
        <a class="action-button" href="mailto:betterdaystherapywellness@gmail.com">Email</a>
        <a class="action-button" href="https://www.betterdaystherapywellness.com/" target="_blank" rel="noopener">Website</a>
        <a class="action-button" href="https://share.google/lAQb2FB6BQLs1FHpq" target="_blank" rel="noopener">Google Business</a>
      </nav>

      <a class="save-button" id="saveContact" href="/api/contact" download="BetterDays_contact.vcf">Save Contact</a>


      <p class="affirmation">“Remember that every stumbling block is merely a stepping stone on your pathway to success.”</p>
      <footer class="card-footer">
        <span>Built by <a href="https://www.kiraunistrategies.com/" target="_blank" rel="noopener">Kirauni Strategies</a>.</span>
      </footer>
    </section>
  </main>
  <script src="script.js" defer></script>
</body>
</html>
